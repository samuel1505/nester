[workspace]
resolver = "2"
members = [
  "contracts/access_control",
  "contracts/allocation_strategy",
  "contracts/nester",
  "contracts/timelock",
  "contracts/treasury",
  "contracts/vault",
  "contracts/vault_token",
  "contracts/yield_registry",
  "libs/common",
  "libs/test_utils",
  "tests/integration",
]

[workspace.dependencies]
soroban-sdk = "=21.7.7"

[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
debug-assertions = false
panic = "abort"
codegen-units = 1
lto = true

# For more information about this profile see https://soroban.stellar.org/docs/basic-tutorials/logging#cargotoml-profile
[profile.release-with-logs]
inherits = "release"
debug-assertions = true
